<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07101c" />
    <meta name="description" content="Osebni finančni dashboard za prihodke, stroške, premoženje in cilje." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Financa" />
    <title>Financa</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css?v=18" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.addEventListener("error", function (event) {
        var root = document.getElementById("app");
        if (root && !root.innerHTML) {
          root.innerHTML = '<main class="login-screen"><section class="login-panel"><h2>Zagon ni uspel</h2><p>' +
            String(event.message || "Neznana napaka.") +
            '</p><button class="button" onclick="location.reload()">Poskusi znova</button></section></main>';
        }
      });
    </script>
    <script type="module" src="./app.js?v=18"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./service-worker.js").catch(function (error) {
            console.warn("PWA predpomnjenje ni bilo vključeno.", error);
          });
        });
      }
    </script>
  </body>
</html>
